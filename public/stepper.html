<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lease wizard — vertical stepper</title>
<style>
  :root {
    --bg: #F7F6F2;
    --card: #FFFFFF;
    --rail: #FBFAF6;
    --ink: #1B1A17;
    --muted: #6B6962;
    --line: #E6E3DC;
    --accent: #2F5D50;
    --accent-soft: #DDE8E3;
    --warn: #B8541E;
    --ring: rgba(47, 93, 80, 0.18);
    --shadow: 0 1px 2px rgba(0,0,0,0.04), 0 8px 24px rgba(0,0,0,0.06);
    --radius: 14px;
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .app {
    display: grid;
    grid-template-columns: 320px 1fr;
    grid-template-rows: 60px 1fr 64px;
    grid-template-areas:
      "topbar topbar"
      "rail   main"
      "rail   footer";
    height: 100vh;
    min-height: 720px;
  }

  /* Mobile only elements, hidden by default */
  .mobile-step-bar { display: none; }
  .sheet-overlay { display: none; }
  .sheet { display: none; }

  /* Top bar */
  .topbar {
    grid-area: topbar;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 28px;
    border-bottom: 1px solid var(--line);
    background: var(--bg);
  }
  .brand {
    display: flex; align-items: center; gap: 10px;
    font-weight: 600; letter-spacing: 0.2px;
  }
  .brand .dot {
    width: 22px; height: 22px; border-radius: 6px;
    background: var(--accent);
    display: grid; place-items: center;
    color: white; font-size: 12px; font-weight: 700;
  }
  .topbar-right {
    display: flex; align-items: center; gap: 14px;
    color: var(--muted); font-size: 13px;
  }
  .save-pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px; border-radius: 999px;
    background: var(--accent-soft); color: var(--accent);
    font-size: 12px; font-weight: 500;
  }
  .save-pill .pulse { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }
  .ghost-btn {
    background: transparent; border: 1px solid var(--line);
    padding: 6px 12px; border-radius: 8px; font-size: 13px;
    color: var(--ink); cursor: pointer;
  }
  .ghost-btn:hover { background: white; }

  /* Rail */
  .rail {
    grid-area: rail;
    background: var(--rail);
    border-right: 1px solid var(--line);
    overflow-y: auto;
    padding: 12px 0 24px;
    scroll-behavior: smooth;
  }
  .rail-head {
    padding: 10px 22px 14px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; background: var(--rail);
    z-index: 1;
  }
  .rail-head .progress-meta {
    font-size: 12px; color: var(--muted);
  }
  .rail-head .progress-meta strong { color: var(--ink); font-weight: 600; }
  .mini-bar {
    height: 4px; background: var(--line); border-radius: 2px;
    overflow: hidden; margin-top: 8px;
  }
  .mini-bar .fill {
    height: 100%; background: var(--accent);
    transition: width 200ms ease;
  }

  /* Step list */
  .steps {
    list-style: none; padding: 0; margin: 0;
    position: relative;
  }
  .step-item {
    display: grid;
    grid-template-columns: 56px 1fr;
    align-items: center;
    min-height: 36px;
    padding: 4px 16px 4px 0;
    cursor: pointer;
    position: relative;
    transition: background 120ms ease;
  }
  .step-item:hover { background: rgba(0,0,0,0.02); }
  .step-item.disabled { cursor: not-allowed; opacity: 0.55; }
  .step-item.disabled:hover { background: transparent; }

  .step-marker {
    display: grid; place-items: center;
    position: relative;
    height: 36px;
  }
  .step-marker .dot {
    width: 22px; height: 22px; border-radius: 50%;
    background: white; border: 1.5px solid var(--line);
    display: grid; place-items: center;
    font-size: 11px; color: var(--muted);
    font-variant-numeric: tabular-nums;
    z-index: 1;
    transition: all 150ms ease;
  }
  /* connector line */
  .step-marker::before {
    content: ""; position: absolute;
    left: 50%; top: -6px; bottom: -6px;
    width: 1.5px; background: var(--line);
    transform: translateX(-50%);
    z-index: 0;
  }
  .step-item:first-child .step-marker::before { top: 50%; }
  .step-item:last-child .step-marker::before { bottom: 50%; }

  .step-item.done .step-marker .dot {
    background: var(--accent); border-color: var(--accent); color: white;
  }
  .step-item.done .step-marker::before { background: var(--accent); }
  .step-item.current .step-marker .dot {
    background: white; border-color: var(--accent); color: var(--accent);
    box-shadow: 0 0 0 4px var(--ring);
  }

  .step-label {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; color: var(--ink); line-height: 1.3;
    padding: 6px 0;
  }
  .step-item.done .step-label { color: var(--muted); }
  .step-item.future .step-label { color: var(--muted); }
  .step-item.current .step-label {
    font-weight: 600; color: var(--ink);
  }
  .step-item.current {
    background: var(--accent-soft);
  }
  .step-item.current .step-label::before {
    content: "";
    width: 3px; height: 24px; border-radius: 2px;
    background: var(--accent);
    margin-right: 4px; margin-left: -7px;
  }
  .opt-tag {
    font-size: 10px; color: var(--muted);
    border: 1px solid var(--line); padding: 1px 6px; border-radius: 4px;
    text-transform: uppercase; letter-spacing: 0.4px;
    background: white;
  }

  /* Main */
  main {
    grid-area: main;
    overflow-y: auto;
    display: flex; justify-content: center;
    padding: 36px 24px 32px;
  }

  .card {
    width: 100%;
    max-width: 640px;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 36px 36px 28px;
    align-self: flex-start;
    animation: fadeUp 240ms ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .step-eyebrow {
    display: flex; align-items: center; gap: 10px;
    font-size: 12px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.6px;
    margin-bottom: 10px;
  }
  .step-eyebrow .num {
    background: var(--accent-soft); color: var(--accent);
    padding: 2px 8px; border-radius: 6px; font-weight: 600;
  }
  .step-eyebrow .optional {
    color: var(--muted);
    border: 1px solid var(--line);
    padding: 1px 7px; border-radius: 6px;
  }
  h1.step-title {
    font-size: 26px; font-weight: 600; line-height: 1.25;
    margin: 0 0 6px;
  }
  p.step-help {
    color: var(--muted); font-size: 14.5px; line-height: 1.55;
    margin: 0 0 22px;
  }

  /* Inputs */
  label.field-label {
    display: block; font-size: 13px; font-weight: 500;
    margin-bottom: 6px; color: var(--ink);
  }
  .input, .select, .textarea {
    width: 100%; padding: 12px 14px;
    border: 1px solid var(--line); border-radius: 10px;
    background: white; font-size: 15px; color: var(--ink);
    font-family: inherit;
    transition: border-color 120ms ease, box-shadow 120ms ease;
  }
  .input:focus, .select:focus, .textarea:focus {
    outline: none; border-color: var(--accent);
    box-shadow: 0 0 0 4px var(--ring);
  }
  .textarea { min-height: 96px; resize: vertical; }
  .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  .input-prefix { position: relative; }
  .input-prefix .symbol {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    color: var(--muted); font-size: 15px; pointer-events: none;
  }
  .input-prefix .input { padding-left: 28px; }

  .choice-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .choice-grid.cols-3 { grid-template-columns: repeat(3, 1fr); }
  .choice {
    border: 1px solid var(--line); border-radius: 10px;
    padding: 14px; cursor: pointer; background: white;
    display: flex; flex-direction: column; gap: 4px;
    transition: all 120ms ease;
  }
  .choice:hover { border-color: #C9C5BC; }
  .choice.selected {
    border-color: var(--accent);
    box-shadow: 0 0 0 4px var(--ring);
    background: var(--accent-soft);
  }
  .choice .label { font-weight: 600; font-size: 14.5px; }
  .choice .desc { font-size: 13px; color: var(--muted); line-height: 1.4; }

  .toggle-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 16px; border: 1px solid var(--line);
    border-radius: 10px; background: white; margin-bottom: 10px;
  }
  .toggle-row .meta .label { font-weight: 600; font-size: 14.5px; }
  .toggle-row .meta .desc { font-size: 13px; color: var(--muted); margin-top: 2px;}
  .switch {
    width: 40px; height: 24px; border-radius: 999px;
    background: var(--line); position: relative; cursor: pointer;
    transition: background 160ms ease;
  }
  .switch::after {
    content: ""; position: absolute; left: 3px; top: 3px;
    width: 18px; height: 18px; border-radius: 50%;
    background: white; box-shadow: 0 1px 2px rgba(0,0,0,0.15);
    transition: transform 160ms ease;
  }
  .switch.on { background: var(--accent); }
  .switch.on::after { transform: translateX(16px); }

  .chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip {
    padding: 8px 14px; border: 1px solid var(--line);
    border-radius: 999px; cursor: pointer; font-size: 13px;
    background: white; user-select: none;
    transition: all 120ms ease;
  }
  .chip:hover { border-color: #C9C5BC; }
  .chip.selected {
    background: var(--accent-soft); border-color: var(--accent); color: var(--accent);
    font-weight: 500;
  }

  /* Footer */
  .footer {
    grid-area: footer;
    border-top: 1px solid var(--line);
    background: var(--bg);
    padding: 0 28px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .footer-left { display: flex; align-items: center; gap: 12px; color: var(--muted); font-size: 13px; }
  .footer-right { display: flex; align-items: center; gap: 10px; }
  .btn {
    border: none; cursor: pointer; font-size: 14px; font-weight: 500;
    padding: 10px 18px; border-radius: 10px;
    font-family: inherit;
    transition: all 120ms ease;
  }
  .btn-secondary {
    background: white; color: var(--ink);
    border: 1px solid var(--line);
  }
  .btn-secondary:hover { background: #FAF9F4; }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { background: #244A40; }
  .btn-link { background: transparent; color: var(--muted); padding: 8px 10px; }
  .btn-link:hover { color: var(--ink); }

  .kbd {
    display: inline-block; padding: 1px 6px;
    border: 1px solid var(--line); border-radius: 5px;
    background: white; font-size: 11px; color: var(--muted);
    font-family: ui-monospace, SF Mono, Menlo, monospace;
  }

  /* Done card */
  .done-card { text-align: center; padding: 48px 36px; }
  .done-card .check-circle {
    width: 64px; height: 64px; border-radius: 50%;
    background: var(--accent-soft); color: var(--accent);
    display: grid; place-items: center;
    margin: 0 auto 20px; font-size: 28px;
  }
  .done-card h2 { font-size: 26px; margin: 0 0 10px; }
  .done-card p { color: var(--muted); max-width: 380px; margin: 0 auto 24px; }

  /* Review */
  .review-list { display: flex; flex-direction: column; gap: 0; }
  .review-row {
    display: grid; grid-template-columns: 1fr auto auto;
    gap: 12px; align-items: center;
    padding: 12px 0; border-bottom: 1px solid var(--line);
  }
  .review-row:last-child { border-bottom: none; }
  .review-row .label { font-size: 14px; font-weight: 500; }
  .review-row .value { color: var(--muted); font-size: 14px; max-width: 260px; text-align: right; }
  .review-row .edit-link {
    color: var(--accent); font-size: 13px; cursor: pointer; font-weight: 500;
  }
  .review-row .edit-link:hover { text-decoration: underline; }

  /* Density toggle */
  .density-toggle {
    display: inline-flex; align-items: center; gap: 4px;
    background: white; border: 1px solid var(--line); border-radius: 8px;
    padding: 2px;
  }
  .density-toggle button {
    background: transparent; border: none; padding: 4px 8px;
    font-size: 12px; cursor: pointer; border-radius: 6px; color: var(--muted);
    font-family: inherit;
  }
  .density-toggle button.active { background: var(--accent-soft); color: var(--accent); font-weight: 500; }

  /* Compact density */
  .rail.compact .step-item { min-height: 28px; }
  .rail.compact .step-marker { height: 28px; }
  .rail.compact .step-marker .dot { width: 18px; height: 18px; font-size: 10px; }
  .rail.compact .step-label { font-size: 12.5px; padding: 3px 0; }

  /* ========== MOBILE ========== */
  @media (max-width: 768px) {
    .app {
      grid-template-columns: 1fr;
      grid-template-rows: 56px auto 1fr 72px;
      grid-template-areas:
        "topbar"
        "stepbar"
        "main"
        "footer";
      height: 100vh;
      min-height: 0;
    }
    .topbar { padding: 0 16px; }
    .topbar .density-toggle { display: none; }
    .topbar .save-pill { display: none; }
    .topbar .ghost-btn { padding: 6px 10px; font-size: 12px; }

    /* Hide the desktop rail on mobile */
    .rail { display: none; }

    /* Show the mobile step summary bar */
    .mobile-step-bar {
      display: flex;
      grid-area: stepbar;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: var(--rail);
      border-bottom: 1px solid var(--line);
      cursor: pointer;
      min-height: 60px;
    }
    .mobile-step-bar .ring {
      position: relative;
      width: 36px; height: 36px;
      flex-shrink: 0;
    }
    .mobile-step-bar svg { width: 36px; height: 36px; transform: rotate(-90deg); }
    .mobile-step-bar svg circle { fill: none; stroke-width: 3; }
    .mobile-step-bar svg .track { stroke: var(--line); }
    .mobile-step-bar svg .progress { stroke: var(--accent); transition: stroke-dashoffset 240ms ease; }
    .mobile-step-bar .ring-num {
      position: absolute; inset: 0; display: grid; place-items: center;
      font-size: 11px; color: var(--ink); font-weight: 600;
      font-variant-numeric: tabular-nums;
    }
    .mobile-step-bar .ms-label { flex: 1; min-width: 0; }
    .mobile-step-bar .ms-eyebrow {
      font-size: 11px; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .mobile-step-bar .ms-title {
      font-size: 14px; font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .mobile-step-bar .chev {
      color: var(--muted); font-size: 16px; flex-shrink: 0;
    }

    /* Card adjustments */
    main { padding: 16px 12px 16px; }
    .card { padding: 22px 20px 20px; max-width: none; }
    h1.step-title { font-size: 22px; }
    p.step-help { font-size: 14px; }

    /* Stack 2 column rows on mobile */
    .row-2 { grid-template-columns: 1fr; }
    .row-3 { grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
    .choice-grid, .choice-grid.cols-3 { grid-template-columns: 1fr; }

    /* Footer: bigger tap targets, side by side */
    .footer {
      padding: 0 12px;
      gap: 8px;
    }
    .footer-left { display: none; }
    .footer-right {
      flex: 1; gap: 8px;
    }
    .footer-right .btn { flex: 1; padding: 13px 16px; font-size: 15px; }
    #skip-btn { display: none !important; }
    /* Show skip as a small link inside the card on mobile via JS if needed */

    /* Bottom sheet for navigation */
    .sheet-overlay {
      display: block;
      position: fixed; inset: 0;
      background: rgba(27, 26, 23, 0.45);
      opacity: 0; pointer-events: none;
      transition: opacity 220ms ease;
      z-index: 30;
    }
    .sheet-overlay.open { opacity: 1; pointer-events: auto; }

    .sheet {
      display: flex;
      position: fixed; left: 0; right: 0; bottom: 0;
      max-height: 80vh;
      background: var(--card);
      border-top-left-radius: 18px;
      border-top-right-radius: 18px;
      box-shadow: 0 -8px 24px rgba(0,0,0,0.18);
      transform: translateY(100%);
      transition: transform 240ms ease;
      z-index: 31;
      flex-direction: column;
    }
    .sheet.open { transform: translateY(0); }
    .sheet-handle {
      width: 40px; height: 4px; border-radius: 2px;
      background: var(--line);
      margin: 10px auto 6px;
    }
    .sheet-head {
      padding: 6px 18px 12px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--line);
    }
    .sheet-head h3 { margin: 0; font-size: 15px; }
    .sheet-head .meta { font-size: 12px; color: var(--muted); }
    .sheet-body {
      overflow-y: auto;
      padding: 6px 0 calc(env(safe-area-inset-bottom, 12px) + 12px);
      flex: 1;
    }
    .sheet .step-item {
      padding: 6px 16px 6px 0;
      min-height: 44px;
    }
    .sheet .step-marker { height: 44px; }
  }

  /* ========== VERY NARROW PHONES ========== */
  @media (max-width: 380px) {
    .row-3 { grid-template-columns: 1fr 1fr; }
    .row-3 > div:last-child { grid-column: span 2; }
    h1.step-title { font-size: 20px; }
    .card { padding: 20px 16px 18px; }
  }
</style>
</head>
<body>

<div class="app">

  <!-- Top bar -->
  <div class="topbar">
    <div class="brand">
      <div class="dot">L</div>
      Lease wizard
    </div>
    <div class="topbar-right">
      <div class="density-toggle" title="Adjust list density">
        <button id="den-comfort" class="active" onclick="setDensity('comfort')">Comfort</button>
        <button id="den-compact" onclick="setDensity('compact')">Compact</button>
      </div>
      <span class="save-pill"><span class="pulse"></span> Saved just now</span>
      <button class="ghost-btn" onclick="alert('We will email you a resume link.')">Save and exit</button>
    </div>
  </div>

  <!-- Mobile step summary bar (visible on mobile only) -->
  <div class="mobile-step-bar" onclick="openSheet()">
    <div class="ring">
      <svg viewBox="0 0 36 36">
        <circle class="track" cx="18" cy="18" r="15.5" />
        <circle class="progress" id="ms-ring" cx="18" cy="18" r="15.5"
          stroke-dasharray="97.4" stroke-dashoffset="97.4" stroke-linecap="round" />
      </svg>
      <div class="ring-num" id="ms-num">1/32</div>
    </div>
    <div class="ms-label">
      <div class="ms-eyebrow" id="ms-eyebrow">Step 1 · ~6 min left</div>
      <div class="ms-title" id="ms-title">Property address</div>
    </div>
    <div class="chev">›</div>
  </div>

  <!-- Left rail -->
  <div class="rail" id="rail">
    <div class="rail-head">
      <div>
        <div class="progress-meta">Step <strong id="meta-current">1</strong> of <strong>32</strong></div>
        <div class="mini-bar"><div class="fill" id="mini-fill" style="width: 3%;"></div></div>
      </div>
      <div class="progress-meta" id="meta-time">~6 min left</div>
    </div>
    <ul class="steps" id="steps"></ul>
  </div>

  <!-- Main -->
  <main>
    <div class="card" id="card"></div>
  </main>

  <!-- Footer -->
  <div class="footer">
    <div class="footer-left">
      <span><span class="kbd">Enter</span> to continue</span>
      <span><span class="kbd">Esc</span> to save and exit</span>
    </div>
    <div class="footer-right">
      <button class="btn btn-link" id="skip-btn" onclick="skipStep()" style="display:none;">Skip this step</button>
      <button class="btn btn-secondary" id="back-btn" onclick="prevStep()">Back</button>
      <button class="btn btn-primary" id="next-btn" onclick="nextStep()">Continue</button>
    </div>
  </div>
</div>

<!-- Mobile bottom sheet for step navigation -->
<div class="sheet-overlay" id="sheet-overlay" onclick="closeSheet()"></div>
<div class="sheet" id="sheet" role="dialog" aria-label="All steps">
  <div class="sheet-handle"></div>
  <div class="sheet-head">
    <div>
      <h3>All steps</h3>
      <div class="meta" id="sheet-meta">Step 1 of 32</div>
    </div>
    <button class="ghost-btn" onclick="closeSheet()">Close</button>
  </div>
  <div class="sheet-body">
    <ul class="steps" id="sheet-steps" style="list-style:none; padding:0; margin:0;"></ul>
  </div>
</div>

<script>
  const steps = [
    { id: 'address',    title: 'Property address',                 help: 'Enter the full address of the rental unit.', optional: false, type: 'address' },
    { id: 'unit',       title: 'Unit or suite number',             help: 'Skip if there is no unit number.', optional: true, type: 'text', placeholder: 'Apt 3B, Unit 12, etc.' },
    { id: 'propType',   title: 'Property type',                    help: 'This affects which clauses we include.', optional: false, type: 'choices', options: [
      { label: 'Single family home', desc: 'Standalone house' },
      { label: 'Apartment',          desc: 'Unit in a multi family building' },
      { label: 'Condo',              desc: 'Owned unit in a shared building' },
      { label: 'Townhouse',          desc: 'Attached multi story home' },
    ]},
    { id: 'beds',       title: 'Bedrooms',                         help: 'Used in the property description section.', optional: false, type: 'number', placeholder: '3' },
    { id: 'baths',      title: 'Bathrooms',                        help: 'Half baths count as 0.5.', optional: false, type: 'number', placeholder: '2', step: 0.5 },
    { id: 'sqft',       title: 'Square footage',                   help: 'Approximate is fine.', optional: true, type: 'number', placeholder: '1450' },
    { id: 'yearBuilt',  title: 'Year built',                       help: 'Required in some states for disclosures.', optional: true, type: 'number', placeholder: '1998' },
    { id: 'landlord',   title: 'Landlord legal name',              help: 'Use the legal name as it should appear on the lease.', optional: false, type: 'text', placeholder: 'Acme Properties LLC' },
    { id: 'llAddress',  title: 'Landlord mailing address',         help: 'Where official notices should be sent.', optional: false, type: 'address' },
    { id: 'llContact',  title: 'Landlord contact details',         help: 'How tenants can reach you for non emergencies.', optional: false, type: 'contact' },
    { id: 'manager',    title: 'Property manager',                 help: 'Add manager details if a third party manages this unit.', optional: false, type: 'toggleDetail', toggleLabel: 'A property manager is responsible for this unit', detailFields: ['Manager name', 'Manager phone'] },
    { id: 'tenant',     title: 'Primary tenant',                   help: 'Full legal name as it appears on government ID.', optional: false, type: 'text', placeholder: 'Jane M. Doe' },
    { id: 'tenantDob',  title: 'Tenant date of birth',             help: 'Used to verify the tenant is a legal adult.', optional: false, type: 'date' },
    { id: 'tenantContact', title: 'Tenant contact details',        help: 'We will send the lease here for signing.', optional: false, type: 'contact' },
    { id: 'cotenants',  title: 'Co tenants',                       help: 'Co tenants share legal responsibility for rent.', optional: true, type: 'list', placeholder: 'Add a co tenant name' },
    { id: 'occupants',  title: 'Other occupants',                  help: 'Anyone else living in the unit, like children.', optional: true, type: 'list', placeholder: 'Add an occupant' },
    { id: 'startDate',  title: 'Lease start date',                 help: 'The first day the tenant can occupy the property.', optional: false, type: 'date' },
    { id: 'term',       title: 'Lease term',                       help: 'Most residential leases run for 12 months.', optional: false, type: 'choices', options: [
      { label: '6 months',  desc: 'Short term' },
      { label: '12 months', desc: 'Standard annual lease' },
      { label: '24 months', desc: 'Two year fixed term' },
      { label: 'Month to month', desc: 'No fixed end date' },
    ]},
    { id: 'rent',       title: 'Monthly rent',                     help: 'Enter the dollar amount due each month.', optional: false, type: 'currency', placeholder: '2,400' },
    { id: 'rentDue',    title: 'Rent due date',                    help: 'The day of the month rent must be received.', optional: false, type: 'choices', cols: 3, options: [
      { label: '1st',  desc: 'Most common' },
      { label: '15th', desc: 'Mid month' },
      { label: 'Other', desc: 'Pick a custom day' },
    ]},
    { id: 'lateFee',    title: 'Late fee',                         help: 'Charged if rent is not received by the grace period.', optional: false, type: 'currency', placeholder: '50' },
    { id: 'grace',      title: 'Grace period',                     help: 'Days after the due date before late fees apply.', optional: false, type: 'number', placeholder: '5' },
    { id: 'deposit',    title: 'Security deposit',                 help: 'Many states cap this at one or two months rent.', optional: false, type: 'currency', placeholder: '2,400' },
    { id: 'pets',       title: 'Pet policy',                       help: 'Pet allowances and restrictions.', optional: false, type: 'choices', options: [
      { label: 'No pets',         desc: 'Pets are not allowed' },
      { label: 'Cats only',       desc: 'Up to 2 cats' },
      { label: 'Dogs and cats',   desc: 'With weight limits' },
      { label: 'Case by case',    desc: 'Pet screening required' },
    ]},
    { id: 'utilities',  title: 'Utilities included',               help: 'Select all the landlord covers.', optional: false, type: 'chips', options: ['Water', 'Sewer', 'Trash', 'Gas', 'Electric', 'Internet', 'Cable', 'Lawn care'] },
    { id: 'parking',    title: 'Parking',                          help: 'Describe parking included with the lease.', optional: true, type: 'choices', options: [
      { label: 'Driveway',        desc: 'Private driveway' },
      { label: 'Garage',          desc: 'Attached or detached' },
      { label: 'Assigned spot',   desc: 'Numbered space in lot' },
      { label: 'Street only',     desc: 'No off street parking' },
    ]},
    { id: 'smoking',    title: 'Smoking policy',                   help: 'Includes tobacco, vaping, and cannabis.', optional: false, type: 'choices', cols: 3, options: [
      { label: 'No smoking',     desc: 'Anywhere on property' },
      { label: 'Outside only',   desc: 'Indoors prohibited' },
      { label: 'Allowed',        desc: 'No restrictions' },
    ]},
    { id: 'sublet',     title: 'Subletting',                       help: 'Whether the tenant may rent the unit to others.', optional: false, type: 'choices', cols: 3, options: [
      { label: 'Not allowed',     desc: 'No subletting' },
      { label: 'With approval',   desc: 'Written consent required' },
      { label: 'Allowed',         desc: 'Tenant decides' },
    ]},
    { id: 'maintenance', title: 'Maintenance',                     help: 'Most leases split this between landlord and tenant.', optional: false, type: 'choices', options: [
      { label: 'Standard split',  desc: 'Landlord covers major, tenant minor' },
      { label: 'Landlord covers all', desc: 'Tenant reports, landlord repairs' },
      { label: 'Tenant under $100', desc: 'Tenant handles small repairs' },
      { label: 'Custom',          desc: 'Define your own arrangement' },
    ]},
    { id: 'insurance',  title: 'Renter insurance',                 help: 'Require tenants to carry their own policy.', optional: false, type: 'toggleDetail', toggleLabel: 'Require renter\u2019s insurance', detailFields: ['Minimum coverage amount'] },
    { id: 'notice',     title: 'Termination notice',               help: 'How far in advance either party must notify.', optional: false, type: 'choices', cols: 3, options: [
      { label: '30 days',  desc: 'Most common' },
      { label: '60 days',  desc: 'Longer notice' },
      { label: '90 days',  desc: 'Maximum standard' },
    ]},
    { id: 'addenda',    title: 'Special clauses',                  help: 'House rules, HOA notes, or anything specific.', optional: true, type: 'textarea', placeholder: 'For example, quiet hours after 10 PM...' },
    // Final review
    { id: 'review', title: 'Review and generate', help: 'Look everything over before generating the lease. Click any row to edit.', optional: false, type: 'review' },
  ];

  const totalSteps = 32;
  let currentIndex = 0;
  const answers = {};

  function timeRemaining() {
    const left = totalSteps - currentIndex;
    const mins = Math.max(1, Math.round(left * 12 / 60));
    if (left <= 0) return 'Almost done';
    return '~' + mins + ' min left';
  }

  // Build rail
  function buildStepItemsHTML() {
    return steps.map((s, i) => {
      const state = i < currentIndex ? 'done' : i === currentIndex ? 'current' : 'future';
      const label = i < totalSteps ? s.title : 'Review and generate';
      return `<li class="step-item ${state}" onclick="goTo(${i})">
        <div class="step-marker"><div class="dot">${i < currentIndex ? '✓' : (i + 1)}</div></div>
        <div class="step-label">
          <span>${label}</span>
          ${s.optional ? '<span class="opt-tag">Optional</span>' : ''}
        </div>
      </li>`;
    }).join('');
  }

  function renderRail() {
    const html = buildStepItemsHTML();
    const list = document.getElementById('steps');
    list.innerHTML = html;
    // Auto scroll the current step into view in the desktop rail
    const cur = list.querySelector('.step-item.current');
    if (cur) cur.scrollIntoView({ block: 'nearest', behavior: 'smooth' });

    // Mirror into the mobile sheet
    const sheetList = document.getElementById('sheet-steps');
    if (sheetList) sheetList.innerHTML = html;

    // Update mobile step bar
    updateMobileStepBar();
  }

  function updateMobileStepBar() {
    const step = steps[currentIndex];
    const numEl = document.getElementById('ms-num');
    const titleEl = document.getElementById('ms-title');
    const eyebrowEl = document.getElementById('ms-eyebrow');
    const ringEl = document.getElementById('ms-ring');
    const sheetMeta = document.getElementById('sheet-meta');
    if (!numEl) return;
    const idx = Math.min(currentIndex + 1, totalSteps);
    numEl.textContent = idx + '/' + totalSteps;
    titleEl.textContent = step ? step.title : 'All done';
    eyebrowEl.textContent = 'Step ' + idx + ' · ' + (currentIndex >= totalSteps ? 'Almost done' : timeRemaining());
    if (sheetMeta) sheetMeta.textContent = 'Step ' + idx + ' of ' + totalSteps;

    // Update progress ring (circumference for r=15.5 is ~97.4)
    const circumference = 2 * Math.PI * 15.5;
    const pct = Math.min(currentIndex / totalSteps, 1);
    ringEl.setAttribute('stroke-dasharray', circumference);
    ringEl.setAttribute('stroke-dashoffset', circumference * (1 - pct));
  }

  function openSheet() {
    document.getElementById('sheet').classList.add('open');
    document.getElementById('sheet-overlay').classList.add('open');
    document.body.style.overflow = 'hidden';
    // Scroll current step into view inside the sheet
    setTimeout(() => {
      const cur = document.querySelector('#sheet-steps .step-item.current');
      if (cur) cur.scrollIntoView({ block: 'center' });
    }, 50);
  }
  function closeSheet() {
    document.getElementById('sheet').classList.remove('open');
    document.getElementById('sheet-overlay').classList.remove('open');
    document.body.style.overflow = '';
  }

  function setDensity(mode) {
    const rail = document.getElementById('rail');
    rail.classList.toggle('compact', mode === 'compact');
    document.getElementById('den-comfort').classList.toggle('active', mode === 'comfort');
    document.getElementById('den-compact').classList.toggle('active', mode === 'compact');
  }

  function updateMeta() {
    document.getElementById('meta-current').textContent = Math.min(currentIndex + 1, totalSteps);
    document.getElementById('meta-time').textContent = currentIndex >= totalSteps ? 'Almost done' : timeRemaining();
    const pct = Math.round((currentIndex / totalSteps) * 100);
    document.getElementById('mini-fill').style.width = pct + '%';
    document.getElementById('back-btn').disabled = currentIndex === 0;
    document.getElementById('back-btn').style.opacity = currentIndex === 0 ? 0.4 : 1;
    document.getElementById('next-btn').textContent = currentIndex === steps.length - 1 ? 'Generate lease' : 'Continue';
    document.getElementById('skip-btn').style.display = steps[currentIndex] && steps[currentIndex].optional ? 'inline-block' : 'none';
  }

  function render() {
    const card = document.getElementById('card');
    const step = steps[currentIndex];
    if (!step) return renderDone();

    card.classList.remove('done-card');
    const eyebrow = `
      <div class="step-eyebrow">
        <span class="num">Step ${Math.min(currentIndex + 1, totalSteps)}</span>
        ${step.optional ? '<span class="optional">Optional</span>' : ''}
      </div>
    `;
    let body = '';
    const v = answers[step.id];

    switch (step.type) {
      case 'text':
        body = `<input class="input" id="f" placeholder="${step.placeholder || ''}" value="${v ?? ''}" />`; break;
      case 'number':
        body = `<input class="input" type="number" id="f" placeholder="${step.placeholder || ''}" value="${v ?? ''}" ${step.step ? 'step="'+step.step+'"' : ''} />`; break;
      case 'date':
        body = `<input class="input" type="date" id="f" value="${v ?? ''}" />`; break;
      case 'currency':
        body = `<div class="input-prefix"><span class="symbol">$</span><input class="input" id="f" inputmode="decimal" placeholder="${step.placeholder || ''}" value="${v ?? ''}" /></div>`; break;
      case 'textarea':
        body = `<textarea class="textarea" id="f" placeholder="${step.placeholder || ''}">${v ?? ''}</textarea>`; break;
      case 'address':
        body = `
          <label class="field-label">Street address</label>
          <input class="input" id="f-street" placeholder="123 Main Street" value="${v?.street ?? ''}" />
          <div style="height: 12px;"></div>
          <div class="row-3">
            <div><label class="field-label">City</label><input class="input" id="f-city" value="${v?.city ?? ''}" /></div>
            <div><label class="field-label">State</label><input class="input" id="f-state" value="${v?.state ?? ''}" /></div>
            <div><label class="field-label">ZIP</label><input class="input" id="f-zip" value="${v?.zip ?? ''}" /></div>
          </div>
        `; break;
      case 'contact':
        body = `
          <div class="row-2">
            <div><label class="field-label">Email</label><input class="input" type="email" id="f-email" placeholder="name@example.com" value="${v?.email ?? ''}" /></div>
            <div><label class="field-label">Phone</label><input class="input" type="tel" id="f-phone" placeholder="(555) 123 4567" value="${v?.phone ?? ''}" /></div>
          </div>
        `; break;
      case 'choices': {
        const cols = step.cols === 3 ? 'cols-3' : '';
        body = `<div class="choice-grid ${cols}" id="f">
          ${step.options.map(o => `
            <div class="choice ${v === o.label ? 'selected' : ''}" data-label="${o.label}" onclick="pickChoice(this)">
              <div class="label">${o.label}</div>
              <div class="desc">${o.desc}</div>
            </div>`).join('')}
        </div>`; break;
      }
      case 'chips': {
        const selected = Array.isArray(v) ? v : [];
        body = `<div class="chips" id="f">
          ${step.options.map(o => `<div class="chip ${selected.includes(o) ? 'selected' : ''}" onclick="toggleChip(this)" data-label="${o}">${o}</div>`).join('')}
        </div>`; break;
      }
      case 'toggleDetail': {
        const on = v?.enabled ?? false;
        body = `
          <div class="toggle-row">
            <div class="meta">
              <div class="label">${step.toggleLabel}</div>
              <div class="desc">Toggle on to add details.</div>
            </div>
            <div class="switch ${on ? 'on' : ''}" id="f-switch" onclick="toggleSwitch(this)"></div>
          </div>
          <div id="f-detail" style="display:${on ? 'block' : 'none'}; margin-top: 8px;">
            ${step.detailFields.map((label, i) => `
              <label class="field-label">${label}</label>
              <input class="input" data-detail="${i}" value="${v?.details?.[i] ?? ''}" />
              <div style="height: 8px;"></div>
            `).join('')}
          </div>
        `; break;
      }
      case 'list': {
        const items = Array.isArray(v) ? v : [];
        body = `
          <div id="f-list">
            ${items.map((it, i) => `
              <div class="toggle-row" style="padding: 10px 14px;">
                <div class="meta"><div class="label">${it}</div></div>
                <button class="ghost-btn" onclick="removeListItem(${i})">Remove</button>
              </div>
            `).join('')}
          </div>
          <div style="display:flex; gap: 8px; margin-top: 8px;">
            <input class="input" id="f-listinput" placeholder="${step.placeholder}" />
            <button class="btn btn-secondary" onclick="addListItem()">Add</button>
          </div>
        `; break;
      }
      case 'review': {
        body = `<div class="review-list">${
          steps.slice(0, totalSteps).map((s, i) => {
            const val = formatAnswer(s.id);
            return `<div class="review-row">
              <div class="label">${s.title}</div>
              <div class="value">${val || '<em style="color:#B8541E">Not set</em>'}</div>
              <a class="edit-link" onclick="goTo(${i})">Edit</a>
            </div>`;
          }).join('')
        }</div>`; break;
      }
    }

    card.innerHTML = eyebrow +
      `<h1 class="step-title">${step.title}${step.type === 'review' ? '' : (step.type === 'choices' || step.type === 'chips' || step.type === 'toggleDetail' ? '' : '')}</h1>
       <p class="step-help">${step.help}</p>
       ${body}`;

    setTimeout(() => {
      const first = card.querySelector('input, textarea');
      if (first) first.focus();
    }, 50);

    updateMeta();
    renderRail();
  }

  function formatAnswer(id) {
    const v = answers[id];
    if (v === undefined || v === null || v === '') return '';
    if (Array.isArray(v)) return v.join(', ');
    if (typeof v === 'object') {
      if (v.street) return [v.street, v.city, v.state, v.zip].filter(Boolean).join(', ');
      if (v.email) return [v.email, v.phone].filter(Boolean).join(' / ');
      if (v.enabled !== undefined) return v.enabled ? ('Yes' + (v.details?.length ? ' (' + v.details.filter(Boolean).join(', ') + ')' : '')) : 'No';
    }
    return String(v);
  }

  function pickChoice(el) {
    document.querySelectorAll('#f .choice').forEach(c => c.classList.remove('selected'));
    el.classList.add('selected');
    answers[steps[currentIndex].id] = el.dataset.label;
  }
  function toggleChip(el) {
    el.classList.toggle('selected');
    const id = steps[currentIndex].id;
    answers[id] = Array.from(document.querySelectorAll('#f .chip.selected')).map(c => c.dataset.label);
  }
  function toggleSwitch(el) {
    el.classList.toggle('on');
    const on = el.classList.contains('on');
    document.getElementById('f-detail').style.display = on ? 'block' : 'none';
    const id = steps[currentIndex].id;
    answers[id] = answers[id] || {};
    answers[id].enabled = on;
  }
  function addListItem() {
    const input = document.getElementById('f-listinput');
    const id = steps[currentIndex].id;
    if (!input.value.trim()) return;
    answers[id] = answers[id] || [];
    answers[id].push(input.value.trim());
    render();
  }
  function removeListItem(i) {
    const id = steps[currentIndex].id;
    answers[id].splice(i, 1);
    render();
  }
  function skipStep() { nextStep(true); }

  function captureCurrent() {
    const step = steps[currentIndex];
    if (!step) return;
    switch (step.type) {
      case 'text': case 'number': case 'date': case 'currency': case 'textarea': {
        const f = document.getElementById('f'); if (f) answers[step.id] = f.value; break;
      }
      case 'address': {
        answers[step.id] = {
          street: document.getElementById('f-street')?.value || '',
          city: document.getElementById('f-city')?.value || '',
          state: document.getElementById('f-state')?.value || '',
          zip: document.getElementById('f-zip')?.value || '',
        }; break;
      }
      case 'contact': {
        answers[step.id] = {
          email: document.getElementById('f-email')?.value || '',
          phone: document.getElementById('f-phone')?.value || '',
        }; break;
      }
      case 'toggleDetail': {
        const on = document.getElementById('f-switch')?.classList.contains('on');
        const details = Array.from(document.querySelectorAll('#f-detail input')).map(i => i.value);
        answers[step.id] = { enabled: !!on, details }; break;
      }
    }
  }

  function nextStep(isSkip = false) {
    if (!isSkip) captureCurrent();
    currentIndex = Math.min(currentIndex + 1, steps.length);
    if (currentIndex >= steps.length) return renderDone();
    render();
  }
  function prevStep() {
    captureCurrent();
    if (currentIndex === 0) return;
    currentIndex--;
    render();
  }
  function goTo(i) {
    captureCurrent();
    currentIndex = i;
    closeSheet();
    render();
  }

  function renderDone() {
    const card = document.getElementById('card');
    card.classList.add('done-card');
    card.innerHTML = `
      <div class="check-circle">✓</div>
      <h2>Your lease is ready</h2>
      <p>We have generated a complete residential lease based on your answers. You can preview it, send it for signature, or download a PDF.</p>
      <div style="display:flex; gap: 10px; justify-content: center;">
        <button class="btn btn-secondary">Preview</button>
        <button class="btn btn-primary">Send for signature</button>
      </div>
    `;
    document.getElementById('meta-current').textContent = totalSteps;
    document.getElementById('meta-time').textContent = 'All done';
    document.getElementById('mini-fill').style.width = '100%';
    document.getElementById('back-btn').style.display = 'none';
    document.getElementById('next-btn').style.display = 'none';
    document.getElementById('skip-btn').style.display = 'none';
    renderRail();
  }

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !(e.target.tagName === 'TEXTAREA')) {
      e.preventDefault(); nextStep();
    } else if (e.key === 'Escape') {
      closeSheet();
    }
  });

  render();
</script>

</body>
</html>
